  n("Workflows", ["Design & sizing","Analysis & modeling","Review & QC","Code compliance & plan review","Quantity takeoff & estimating","Permitting & entitlement","Inspection & condition assessment","Forensic investigation & litigation","Monitoring & digital twin","Feasibility & due diligence","Multi-domain council","Research & literature synthesis","Commissioning & handover"]),
  n("Verification & trust", ["First-principles logic","Verified tools & answer keys","Benchmarking & re-certification","Named domain-expert verifiers","Provenance & audit trail","Scope & refusal contracts","Human sign-off","Agentic orchestration & federation"]),
  n("Built Environment", [
    n("Architecture, interiors & space", ["Architectural design & schematic layout","Interior systems & fit-out","Space programming & adjacency","Accessibility & universal design","Acoustics & daylighting","Historic preservation & adaptive reuse"]),
    n("Building physics", ["Building envelope & moisture","Thermal performance & energy modeling","Fire & life safety engineering","Vertical transportation","Building acoustics & vibration isolation"]),
    n("Green & high-performance buildings", ["LEED / WELL / green certification","Embodied & operational carbon","Net-zero & passive design","Daylight & occupant comfort","Material health & circularity","Resilient & climate-adaptive design"]),
    n("Planning, urban systems & mobility", ["Urban planning & land use","Transportation planning & demand","Transit, micromobility & parking","Smart cities & sensing"]),
    n("Real estate, cost & delivery", ["Feasibility & highest-and-best-use","Development pro forma & finance","Cost estimating & quantity takeoff","Procurement & delivery models","Scheduling & construction sequencing","Risk, claims & contingency"]),
    n("Operations & asset management", ["Facilities management & O&M","Asset registers & lifecycle","Digital twin & BIM-FM handoff","Condition assessment & maintenance","Energy & utility operations","Space & occupancy management"]),
    n("Environment, water & utilities", ["Stormwater & site drainage","Water supply & distribution","Wastewater & treatment","Solid waste & utilities","Environmental permitting & impact","Ecology, wetlands & remediation"]),
    n("Codes, compliance & risk", ["Building codes & amendments","Permitting & plan review","Construction law & contracts","Insurance, bonding & liability","Resilience & business continuity"]),
    n("HVAC & mechanical building systems", ["Heating & cooling load calculation","Psychrometrics & air-conditioning","Air-handling & ventilation","Ductwork & air distribution","Hydronic & chilled-water systems","Central plant (chillers, boilers, cooling towers)","VRF & heat pumps","Ventilation & indoor air quality (ASHRAE 62.1)","Dedicated outdoor air & energy recovery","Smoke control & stair pressurization"]),
    n("Plumbing & fire protection systems", ["Domestic water supply & sizing","Sanitary drainage, waste & vent","Storm & roof drainage","Backflow prevention","Natural gas & fuel piping","Medical gas systems (NFPA 99)","Fire sprinklers (NFPA 13)","Standpipes & fire pumps (NFPA 14 / 20)","Hydraulic calculations","Clean-agent suppression (NFPA 2001)"]),
    n("Electrical & power building systems", ["Power distribution & one-line diagrams","Load calculations & demand (NEC)","Service, switchgear & panelboards","Short-circuit & coordination study","Arc-flash analysis (NFPA 70E)","Grounding, bonding & lightning protection","Emergency & standby power","UPS & power quality","Motor control & VFDs","Electrical code compliance (NEC)"]),
    n("Lighting & illumination engineering", ["Photometrics & illuminance (IES)","Interior lighting design","Exterior & site lighting","Daylight harvesting & integration","Lighting controls & dimming","Emergency & egress lighting","Human-centric & circadian lighting","Lighting power density (ASHRAE 90.1)","Light pollution & dark-sky"]),
    n("Fire protection & life safety engineering", ["Means of egress & occupant load","Occupancy & construction classification","Fire & smoke compartmentation","Fire-resistance-rated assemblies","Egress & evacuation modeling","Smoke control design","Performance-based fire design (SFPE)","Fire & smoke modeling (CFD / FDS)","Fire alarm & detection (NFPA 72)","Fire department access & water supply"]),
    n("Low-voltage, ICT & building technology", ["Structured cabling (TIA-568)","Audiovisual & multimedia","Security, access control & surveillance","Intrusion detection & mass notification","Distributed antenna & in-building wireless","Network & data infrastructure","Nurse call & healthcare comms","Pathways, spaces & telecom rooms"]),
    n("Building automation, controls & smart buildings", ["Building automation systems (BAS / BMS)","Direct digital control (DDC)","Sequences of operation (ASHRAE G36)","Open protocols (BACnet / Modbus)","Fault detection & diagnostics","Analytics & ongoing commissioning","Smart building & IoT integration","Cybersecurity for building systems"]),
    n("Facade & building enclosure engineering", ["Curtain wall systems","Window wall & storefront","Cladding & rainscreen","Structural sealant & glazing","Structural glass design","Enclosure thermal & condensation","Air & water infiltration testing","Enclosure commissioning","Building-integrated photovoltaics (BIPV)","Facade access & maintenance"]),
    n("Landscape architecture & site development", ["Site grading & earthwork","Planting design & horticulture","Hardscape & site materials","Green-infrastructure site design","Site furnishings & amenities","Erosion control & site restoration","Irrigation design","Site accessibility & circulation"]),
    n("Land use, zoning & entitlement", ["Zoning ordinances & use classification","Variances & conditional use permits","Rezoning & map amendments","Planned unit developments","Overlay & special districts","Entitlement strategy & process","Site plan & subdivision approval","Environmental review (NEPA / CEQA)","Easements, covenants & deed restrictions","Historic & landmark review"]),
    n("Urban design & physical form", ["Urban design frameworks & guidelines","Streetscape & public realm","Block, street & parcel patterning","Typology & massing studies","Transit-oriented & corridor design","Walkability & pedestrian-scale design","Visual impact & view corridors","3D city & massing modeling","Design review & character standards"]),
    n("Housing & community development", ["Housing needs assessment","Affordable & workforce housing","Mixed-income & inclusionary housing","Supportive & special-needs housing","Manufactured & modular housing","Missing-middle & gentle density","Housing finance & subsidy programs","Community development (CDBG / HOME)","Neighborhood revitalization","Anti-displacement & equity"]),
    n("Economic development & infrastructure finance", ["Economic base & cluster analysis","Fiscal & economic impact analysis","Tax increment financing","Special assessment & BID districts","Impact fees & development charges","Municipal bonds & public finance","Value capture & land value finance","Incentives, abatements & enterprise zones","Benefit-cost analysis","Public-private partnership structuring"])
  ])
]);

var dx=15, dy=270;
var root = d3.hierarchy(DATA);
root.x0=0; root.y0=0;
root.descendants().forEach(function(d,i){ d.id=i; d._children=(d.children&&d.children.length)?d.children:null; if(d.depth>=2) d.children=null; });

var COL = {live:"#e2b557", building:"#e79ab2", open:"#6f5c66"};
var STATUS = {
  "Statics":"live","Mechanics of materials":"live","Deterministic solvers":"live",
  "First-principles logic":"live","Verified tools & answer keys":"live",
  "Human sign-off":"live","Scope & refusal contracts":"live",
  "Structural analysis":"building","Loads & combinations":"building","Steel design (AISC)":"building",
  "Reinforced concrete (ACI)":"building","Engineering mathematics":"building","Sanity & plausibility":"building",
  "Named domain-expert verifiers":"building","Benchmarking & re-certification":"building",
  "Agentic orchestration & federation":"building","Provenance & audit trail":"building","Calculation packages":"building"
};
function st(d){ return STATUS[d.data.name] || "open"; }
function computeAgg(d){
  var kids = d._children || d.children;
  if(!kids || !kids.length){ d.agg = st(d); return d.agg; }
  var best="open";
  kids.forEach(function(c){ var s=computeAgg(c); if(s==="live") best="live"; else if(s==="building" && best!=="live") best="building"; });
  d.agg=best; return d.agg;
}
computeAgg(root);
var counts={live:0,building:0,open:0};
(function countAll(d){ var k=d._children||d.children; if(!k||!k.length){ counts[st(d)]++; return; } k.forEach(countAll); })(root);
var sb=document.getElementById("statusbar");
if(sb){ sb.textContent = counts.live+" live  ·  "+counts.building+" in progress  ·  "+counts.open+" planned  ·  the Formation Labs harness, every domain we build and verify"; }

var W=window.innerWidth, H=window.innerHeight;
var svg=d3.select("#chart").append("svg").attr("width",W).attr("height",H)
  .style("font-family","Inter, sans-serif").style("font-size","12.5px");
var gZoom=svg.append("g");
var gLink=gZoom.append("g").attr("fill","none").attr("stroke","rgba(226,181,87,0.22)").attr("stroke-width",1);
var gNode=gZoom.append("g").attr("class","node").attr("cursor","pointer").attr("pointer-events","all");
var zoom=d3.zoom().scaleExtent([0.18,2.2]).on("zoom",function(e){ gZoom.attr("transform",e.transform); });
svg.call(zoom);

var tree=d3.tree().nodeSize([dx,dy]);
var diagonal=d3.linkHorizontal().x(function(d){return d.y;}).y(function(d){return d.x;});

function update(source){
  var nodes=root.descendants().reverse();
  var links=root.links();
  tree(root);

  var node=gNode.selectAll("g").data(nodes,function(d){return d.id;});
  var nodeEnter=node.enter().append("g")
    .attr("transform",function(){return "translate("+source.y0+","+source.x0+")";})
    .attr("fill-opacity",0).attr("stroke-opacity",0)
    .attr("tabindex",0).attr("role","button")
    .attr("aria-label",function(d){ return d.data.name + (d._children?" (toggle)":""); })
    .on("click",function(event,d){ d.children=d.children?null:d._children; update(d); })
    .on("keydown",function(event,d){ if(event.key==="Enter"||event.key===" "){ event.preventDefault(); d.children=d.children?null:d._children; update(d); } });
  nodeEnter.append("circle")
    .attr("r",function(d){return d.depth===0?7:(d._children?5:3.6);})
    .attr("fill",function(d){return d.children?"#130a0f":COL[d.agg];})
    .attr("stroke",function(d){return COL[d.agg];})
    .attr("stroke-width",function(d){return d.depth===0?2:(d._children?1.5:1);});
  nodeEnter.append("text")
    .attr("dy","0.32em")
    .attr("x",function(d){return d._children||d.depth===0?-10:10;})
    .attr("text-anchor",function(d){return d._children||d.depth===0?"end":"start";})
    .attr("fill",function(d){ if(d._children) return d.depth<=1?"#ece3da":"#cdbcc4"; var c={live:"#f0d486",building:"#e79ab2",open:"#9d8a92"}; return c[d.agg]; })
    .attr("font-weight",function(d){return d.depth<=1?600:400;})
    .attr("font-size",function(d){return d.depth===0?"15px":(d.depth===1?"13.5px":"12.5px");})
    .text(function(d){return d.data.name;});

  var nodeUpdate=node.merge(nodeEnter);
  nodeUpdate.transition().duration(260)
    .attr("transform",function(d){return "translate("+d.y+","+d.x+")";})
    .attr("fill-opacity",1).attr("stroke-opacity",1);
  nodeUpdate.select("circle").attr("fill",function(d){return d.children?"#130a0f":COL[d.agg];}).attr("stroke",function(d){return COL[d.agg];});

  node.exit().transition().duration(260)
    .attr("transform",function(){return "translate("+source.y+","+source.x+")";})
    .attr("fill-opacity",0).attr("stroke-opacity",0).remove();

  var link=gLink.selectAll("path").data(links,function(d){return d.target.id;});
  var linkEnter=link.enter().append("path").attr("d",function(){var o={x:source.x0,y:source.y0};return diagonal({source:o,target:o});});
  link.merge(linkEnter).transition().duration(260).attr("d",diagonal);
  link.exit().transition().duration(260).attr("d",function(){var o={x:source.x,y:source.y};return diagonal({source:o,target:o});}).remove();

  root.eachBefore(function(d){ d.x0=d.x; d.y0=d.y; });
}
update(root);

// fit the tree to the viewport (re-runs on resize)
function fitView(animate){
  var b={x0:1e9,x1:-1e9,y0:1e9,y1:-1e9};
  root.descendants().forEach(function(d){ b.x0=Math.min(b.x0,d.x); b.x1=Math.max(b.x1,d.x); b.y0=Math.min(b.y0,d.y); b.y1=Math.max(b.y1,d.y); });
  var w=(b.y1-b.y0)+460, h=(b.x1-b.x0)+120;
  var k=Math.min(W/w, H/h, 1)*0.92;
  var tx=W/2 - k*((b.y0+b.y1)/2) + 30;
  var ty=H/2 - k*((b.x0+b.x1)/2);
  (animate?svg.transition().duration(450):svg).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(k));
}
setTimeout(function(){ fitView(true); }, 120);

var rzT;
window.addEventListener("resize",function(){ W=window.innerWidth; H=window.innerHeight; svg.attr("width",W).attr("height",H); clearTimeout(rzT); rzT=setTimeout(function(){ fitView(false); }, 150); });
</script>
</body>
